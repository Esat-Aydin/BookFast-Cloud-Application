name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: "22"

jobs:
  frontend-validation:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Run linter
        run: npm run lint
        working-directory: src/frontend

      - name: Run tests
        run: npm test -- --run
        working-directory: src/frontend
        continue-on-error: true

      - name: Build frontend
        run: npm run build
        working-directory: src/frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-drop
          path: src/frontend/dist
          retention-days: 5

  api-validation:
    name: API - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dotnet tools
        run: dotnet tool restore
        working-directory: src/api

      - name: Restore API dependencies
        run: dotnet restore src/api/BookFast.API.Tests/BookFast.API.Tests.csproj

      - name: Check API formatting
        run: dotnet tool run dotnet-format -- BookFast.API/BookFast.API.csproj --check
        working-directory: src/api

      - name: Build API tests
        run: dotnet build src/api/BookFast.API.Tests/BookFast.API.Tests.csproj --configuration Release --no-restore

      - name: Run API unit tests
        run: dotnet test src/api/BookFast.API.Tests/BookFast.API.Tests.csproj --configuration Release --logger "trx;LogFileName=api-test-results.trx" --no-build --no-restore

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/api-test-results.trx"
          check_name: API Test Results

      - name: Publish API for deployment
        run: dotnet publish src/api/BookFast.API/BookFast.API.csproj --configuration Release --output "${RUNNER_TEMP}/api-published" --no-restore

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-drop
          path: ${{ runner.temp }}/api-published
          retention-days: 5

  functions-validation:
    name: Functions - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dotnet tools
        run: dotnet tool restore
        working-directory: src/api

      - name: Restore Functions dependencies
        run: dotnet restore src/functions/BookFast.Reporting.Functions.Tests/BookFast.Reporting.Functions.Tests.csproj

      - name: Check Functions formatting
        run: dotnet tool run dotnet-format -- ../functions/BookFast.Reporting.Functions/BookFast.Reporting.Functions.csproj --check
        working-directory: src/api

      - name: Check Functions test formatting
        run: dotnet tool run dotnet-format -- ../functions/BookFast.Reporting.Functions.Tests/BookFast.Reporting.Functions.Tests.csproj --check
        working-directory: src/api

      - name: Build Functions tests
        run: dotnet build src/functions/BookFast.Reporting.Functions.Tests/BookFast.Reporting.Functions.Tests.csproj --configuration Release --no-restore

      - name: Run Functions unit tests
        run: dotnet test src/functions/BookFast.Reporting.Functions.Tests/BookFast.Reporting.Functions.Tests.csproj --configuration Release --logger "trx;LogFileName=functions-test-results.trx" --no-build --no-restore

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/functions-test-results.trx"
          check_name: Functions Test Results

      - name: Publish Functions for deployment
        run: dotnet publish src/functions/BookFast.Reporting.Functions/BookFast.Reporting.Functions.csproj --configuration Release --output "${RUNNER_TEMP}/functions-published" --no-restore

      - name: Upload Functions artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functions-drop
          path: ${{ runner.temp }}/functions-published
          retention-days: 5

  results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [frontend-validation, api-validation, functions-validation]
    if: always()

    steps:
      - name: Report build status
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: ${{ needs.frontend-validation.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: ${{ needs.api-validation.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Functions: ${{ needs.functions-validation.result }}" >> "$GITHUB_STEP_SUMMARY"
