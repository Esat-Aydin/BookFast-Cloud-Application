on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  frontend-validation:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - uses: actions/setup-node@v4
      name: Setup Node.js
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: src/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: src/frontend

    - name: Run tests
      run: npm test -- --run
      working-directory: src/frontend
      continue-on-error: true

    - name: Build frontend
      run: npm run build
      working-directory: src/frontend

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-drop
        path: src/frontend/dist
        retention-days: 5

  api-validation:
    name: API - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - uses: actions/setup-dotnet@v4
      name: Setup .NET
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore src/api/BookFast.API/BookFast.API.csproj

    - name: Build API
      run: dotnet build src/api/BookFast.API/BookFast.API.csproj --configuration Release --no-restore

    - name: Run API unit tests
      run: dotnet test src/api/BookFast.API.Tests/BookFast.API.Tests.csproj --configuration Release --logger "trx;LogFileName=test-results.trx" --no-build
      continue-on-error: false

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: '**/test-results.trx'
        check_name: API Test Results

    - name: Publish API for deployment
      run: dotnet publish src/api/BookFast.API/BookFast.API.csproj -c Release -o ./api-published

    - name: Upload API artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-drop
        path: ./api-published
        retention-days: 5

  results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [frontend-validation, api-validation]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Report build status
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "Frontend: ✅" >> $GITHUB_STEP_SUMMARY
        echo "API: ✅" >> $GITHUB_STEP_SUMMARY
        echo "Artifacts published!" >> $GITHUB_STEP_SUMMARY

  build-frontend-image:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: frontend-validation
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - uses: docker/setup-buildx-action@v3
      name: Setup Docker Buildx

    - uses: docker/login-action@v3
      name: Login to GitHub Container Registry
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - uses: docker/build-push-action@v5
      name: Build and push frontend image
      with:
        context: src/frontend
        file: src/frontend/Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}/frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-api-image:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    needs: api-validation
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - uses: docker/setup-buildx-action@v3
      name: Setup Docker Buildx

    - uses: docker/login-action@v3
      name: Login to GitHub Container Registry
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - uses: docker/build-push-action@v5
      name: Build and push API image
      with:
        context: src/api
        file: src/api/BookFast.API/Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}/api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max