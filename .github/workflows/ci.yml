name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  frontend-validation:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - uses: actions/setup-node@v4
      name: Setup Node.js
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: src/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: src/frontend

    - name: Run tests
      run: npm test -- --run
      working-directory: src/frontend
      continue-on-error: true

    - name: Build frontend
      run: npm run build
      working-directory: src/frontend

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-drop
        path: src/frontend/dist
        retention-days: 5

  api-validation:
    name: API - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - uses: actions/setup-dotnet@v4
      name: Setup .NET
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore src/api/BookFast.API/BookFast.API.csproj

    - name: Build API
      run: dotnet build src/api/BookFast.API/BookFast.API.csproj --configuration Release --no-restore

    - name: Run API unit tests with coverage
      run: |
        dotnet test src/api/BookFast.API.Tests/BookFast.API.Tests.csproj --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults --logger "trx;LogFileName=test-results.trx" --no-build
      continue-on-error: false

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: '**/test-results.trx'
        check_name: API Test Results

    - name: Install reportgenerator (optional, needed to generate Cobertura/HTML)
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate coverage report (Cobertura + HTML)
      run: |
        reportgenerator -reports:src/api/BookFast.API.Tests/TestResults/**/coverage.cobertura.xml -targetdir:src/api/BookFast.API.Tests/coverage-report "-reporttypes:Html;Cobertura"

    - name: Upload API coverage artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-coverage
        path: |
          src/api/BookFast.API.Tests/TestResults
          src/api/BookFast.API.Tests/coverage-report
        retention-days: 5

    - name: Fail if coverage below threshold (70%)
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path src/api/BookFast.API.Tests/TestResults -Recurse -Filter "coverage.cobertura.xml" | Select-Object -First 1
        if (-not $file) {
          Write-Host "Coverage file not found. Failing job."; exit 1
        }
        $content = Get-Content $file.FullName -Raw
        if ($content -match 'line-rate="([0-9.]+)"') {
          $rate = [double]$matches[1]
        } elseif ($content -match 'line-rate="([0-9.]+)"') {
          $rate = [double]$matches[1]
        } else {
          # fallback: try match line-rate or branch-rate variations
          if ($content -match 'lines-covered="(\d+)".+lines-valid="(\d+)"') {
            $covered = [double]$matches[1]
            $valid = [double]$matches[2]
            $rate = ($covered / $valid)
          } else {
            Write-Host "Could not determine coverage rate from file."; exit 1
          }
        }
        $percent = [math]::Round($rate * 100, 2)
        Write-Host "Line coverage: $percent%"
        if ($percent -lt 70) {
          Write-Host "Coverage $percent% is below threshold 70%. Failing job."; exit 1
        } else {
          Write-Host "Coverage $percent% meets threshold."
        }

    - name: Publish API for deployment
      run: dotnet publish src/api/BookFast.API/BookFast.API.csproj -c Release -o ./api-published

    - name: Upload API artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-drop
        path: ./api-published
        retention-days: 5

  results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [frontend-validation, api-validation]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Report build status
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "Frontend: ✅" >> $GITHUB_STEP_SUMMARY
        echo "API: ✅" >> $GITHUB_STEP_SUMMARY
        echo "Artifacts published!" >> $GITHUB_STEP_SUMMARY