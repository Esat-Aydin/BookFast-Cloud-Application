name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  frontend-validation:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - uses: actions/setup-node@v4
      name: Setup Node.js
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: src/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: src/frontend

    - name: Run linter
      run: npm run lint
      working-directory: src/frontend

    - name: Run tests
      run: npm test -- --run
      working-directory: src/frontend
      continue-on-error: true

    - name: Build frontend
      run: npm run build
      working-directory: src/frontend

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-drop
        path: src/frontend/dist
        retention-days: 5

  api-validation:
    name: API - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - uses: actions/setup-dotnet@v4
      name: Setup .NET
      with:
        dotnet-version: '10.0.x'

    - name: Ensure dotnet-format is available
      run: |
        echo "-- DOTNET DIAGNOSTICS --"
        dotnet --version
        dotnet --list-sdks
        echo "-- NUGET SOURCES --"
        dotnet nuget list source --format Short || true
        echo "-- TOOL MANIFEST CHECK --"
        if [ ! -f src/api/dotnet-tools.json ]; then
          echo "Manifest missing; creating and installing dotnet-format"
          dotnet new tool-manifest --force --output src/api
          dotnet tool install dotnet-format --local --version 5.1.250801 --verbosity minimal || true
        fi
        echo "-- RESTORING TOOLS --"
        dotnet tool restore --verbosity detailed || true
      shell: bash

    - name: "Diagnostic: show src/api files"
      shell: bash
      run: |
        ls -la src/api
        if [ -f src/api/dotnet-tools.json ]; then
          cat src/api/dotnet-tools.json
        else
          echo "(no manifest found)"
        fi
    - name: Restore dotnet tools
      working-directory: src/api
      run: dotnet tool restore --verbosity detailed
    - name: Run .NET linter (dotnet format)
      run: |
        # Use explicit project path and --check for compatibility with installed dotnet-format
        dotnet tool run dotnet-format -- BookFast.API/BookFast.API.csproj --check
      working-directory: src/api
      continue-on-error: false

    - name: Restore dependencies
      run: dotnet restore src/api/BookFast.API/BookFast.API.csproj

    - name: Build API
      run: dotnet build src/api/BookFast.API/BookFast.API.csproj --configuration Release --no-restore

    - name: Run API unit tests
      run: dotnet test src/api/BookFast.API.Tests/BookFast.API.Tests.csproj --configuration Release --logger "trx;LogFileName=test-results.trx" --no-build
      continue-on-error: false

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: '**/test-results.trx'
        check_name: API Test Results

    - name: Publish API for deployment
      run: dotnet publish src/api/BookFast.API/BookFast.API.csproj -c Release -o ./api-published

    - name: Upload API artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-drop
        path: ./api-published
        retention-days: 5

  results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [frontend-validation, api-validation]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Report build status
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "Frontend: ✅" >> $GITHUB_STEP_SUMMARY
        echo "API: ✅" >> $GITHUB_STEP_SUMMARY
        echo "Artifacts published!" >> $GITHUB_STEP_SUMMARY