name: Infra Deploy

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: GitHub environment and Terraform tfvars target.
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
        default: dev
      apply:
        description: Apply the Terraform plan after a successful validation and plan.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: infra-deploy-${{ inputs.environment_name }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Initialize Terraform backend
        shell: bash
        env:
          TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
        run: |
          set -euo pipefail

          if [ -n "${TFSTATE_RESOURCE_GROUP}" ] && [ -n "${TFSTATE_STORAGE_ACCOUNT}" ] && [ -n "${TFSTATE_CONTAINER}" ]; then
            terraform init \
              -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP}" \
              -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
              -backend-config="container_name=${TFSTATE_CONTAINER}" \
              -backend-config="key=bookfast-${{ inputs.environment_name }}.tfstate"
          else
            if [ "${{ inputs.apply }}" = "true" ]; then
              echo "Remote Terraform state configuration is required when apply=true." >&2
              echo "Set GitHub environment variables TFSTATE_RESOURCE_GROUP, TFSTATE_STORAGE_ACCOUNT, and TFSTATE_CONTAINER." >&2
              exit 1
            fi

            echo "Remote backend variables are not configured. Falling back to a local backend for validation and plan-only execution."
            terraform init
          fi

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Validate Terraform
        run: terraform validate

      - name: Plan Terraform changes
        run: terraform plan -input=false -var-file="environments/${{ inputs.environment_name }}.tfvars" -out="bookfast-${{ inputs.environment_name }}.tfplan"

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-${{ inputs.environment_name }}-plan
          path: infra/terraform/bookfast-${{ inputs.environment_name }}.tfplan
          retention-days: 5

      - name: Apply Terraform changes
        if: ${{ inputs.apply }}
        run: terraform apply -input=false -auto-approve "bookfast-${{ inputs.environment_name }}.tfplan"

      - name: Publish deployment summary
        if: always()
        run: |
          echo "## Terraform summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${{ inputs.environment_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Apply requested: ${{ inputs.apply }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Azure portal: https://portal.azure.com/#view/HubsExtension/BrowseResourceGroups" >> "$GITHUB_STEP_SUMMARY"
