services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${BOOKFAST_DB_PASSWORD:-BookFastDev123!}"
    volumes:
      - bookfast-sql-data:/var/opt/mssql

  api:
    build:
      context: ./src/api/BookFast.API
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__BookFastDatabase: "Server=sql-server,1433;Database=BookFast;User Id=sa;Password=${BOOKFAST_DB_PASSWORD:-BookFastDev123!};Encrypt=True;TrustServerCertificate=True"
      Persistence__ApplyMigrationsOnStartup: "true"
    depends_on:
      - sql-server

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  bookfast-sql-data:
